<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strat Sector & Cycle Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .sig-2u { color: #10b981; font-weight: 800; border-right: 3px solid #10b981; padding-right: 4px; }
        .sig-2d { color: #f87171; font-weight: 800; border-right: 3px solid #f87171; padding-right: 4px; }
        .sig-3 { color: #60a5fa; font-weight: 800; text-decoration: underline; }
        .sig-1 { color: #fbbf24; font-weight: 800; }
        .bg-obsidian { background: #040608; }
        .rotation-glow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.15); }
        .custom-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
    </style>
</head>
<body class="bg-obsidian text-slate-300 min-h-screen p-4 font-sans">

    <div class="max-w-[1850px] mx-auto">
        <header class="flex justify-between items-center mb-6 border-b border-slate-900 pb-4">
            <div>
                <h1 class="text-xl font-black text-white italic tracking-tighter uppercase">Strat Institutional Intelligence</h1>
                <p class="text-[10px] text-slate-500 font-bold tracking-[0.2em] uppercase">21 Sector Thematic Matrix • 15-Year Forecast Engine</p>
            </div>
            <button onclick="runAdvancedScan()" class="bg-blue-600 hover:bg-blue-500 text-white text-[10px] font-black py-2.5 px-10 rounded uppercase tracking-widest transition-all">Execute Intelligence Scan</button>
        </header>

        <div id="dashboard" class="grid custom-grid gap-3 mb-8">
            </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 bg-slate-900/30 p-6 rounded-xl border border-slate-900 rotation-glow">
                <h2 class="text-white text-[10px] font-black uppercase mb-4 tracking-widest italic">Institutional Flow Momentum (Relative Strength)</h2>
                <canvas id="rotationChart" height="110"></canvas>
            </div>

            <div id="gemini-forecast" class="bg-blue-900/10 border border-blue-500/30 p-6 rounded-xl hidden">
                <h3 class="text-blue-400 font-black text-xs italic mb-4 uppercase underline">Institutional Interpretation & Forecast</h3>
                <div id="forecast-content" class="text-[13px] leading-relaxed space-y-4"></div>
            </div>
        </div>
    </div>

    <script>
        const POLYGON_KEY = "lvT1rS4fdQJtn3cWMAcnps4Yf5bvTGTn";

        const groups = {
            "DJIA (The Dow)": ["UNH", "GS", "MSFT", "HD", "AMGN", "CAT", "CRM"],
            "XLK (Tech)": ["XLK", "MSFT", "AAPL", "NVDA", "AVGO", "ORCL", "ADBE"],
            "SMH (Semis)": ["SMH", "NVDA", "TSM", "AVGO", "ASML", "AMD", "QCOM"],
            "IGV (Software)": ["IGV", "CRM", "MSFT", "ADBE", "ORCL", "NOW", "INTU"],
            "HACK (Cyber)": ["HACK", "CSCO", "PANW", "CRWD", "NET", "ZS", "FTNT"],
            "XLF (Financial)": ["XLF", "JPM", "V", "MA", "BAC", "GS", "MS"],
            "XLE (Energy)": ["XLE", "XOM", "CVX", "COP", "SLB", "EOG", "MPC"],
            "XLB (Materials)": ["XLB", "LIN", "APD", "SHW", "FCX", "ECL", "NEM"],
            "XHB (Housing)": ["XHB", "LEN", "DHI", "PHM", "NVR", "TOL", "LOW"],
            "XRT (Retail)": ["XRT", "AMZN", "WMT", "TGT", "COST", "TJX", "ROST"],
            "XLV (Health)": ["XLV", "LLY", "UNH", "JNJ", "ABBV", "MRK", "TMO"],
            "XLY (Disc)": ["XLY", "AMZN", "TSLA", "HD", "MCD", "NKE", "LOW"],
            "XLP (Staple)": ["XLP", "PG", "COST", "KO", "PEP", "PM", "WMT"],
            "XLI (Indus)": ["XLI", "GE", "CAT", "UNP", "HON", "RTX", "LMT"],
            "XLU (Util)": ["XLU", "NEE", "SO", "DUK", "CEG", "SRE", "AEP"],
            "XLRE (RE)": ["XLRE", "PLD", "AMT", "EQIX", "WELL", "PSA", "CCI"],
            "XLC (Comm)": ["XLC", "META", "GOOGL", "GOOG", "NFLX", "TMUS", "VZ"],
            "IBIT (BTC)": ["IBIT", "MSTR", "COIN", "MARA", "RIOT", "HOOD", "CLSK"],
            "ARKK (Innov)": ["ARKK", "TSLA", "COIN", "ROKU", "PATH", "SPOT", "DKNG"],
            "ICLN (Clean)": ["ICLN", "FSLR", "ENPH", "NEE", "IBE", "EDP", "VER"],
            "IWM (Small)": ["IWM", "VRTX", "VRT", "SMCI", "DECK", "STX", "MSTR"]
        };

        let rotChart = null;

        async function runAdvancedScan() {
            const dash = document.getElementById('dashboard');
            dash.innerHTML = '<div class="col-span-full py-20 text-center font-bold text-blue-500 animate-pulse uppercase tracking-widest text-xs">SYNCHRONIZING INSTITUTIONAL TAPE...</div>';

            try {
                const url = `https://api.polygon.io/v2/aggs/grouped/locale/us/market/stocks/2026-04-24?adjusted=true&apiKey=${POLYGON_KEY}`;
                const prevUrl = `https://api.polygon.io/v2/aggs/grouped/locale/us/market/stocks/2026-04-23?adjusted=true&apiKey=${POLYGON_KEY}`;
                
                const [cR, pR] = await Promise.all([fetch(url), fetch(prevUrl)]);
                const cD = await cR.json();
                const pD = await pR.json();

                const cMap = new Map(cD.results.map(i => [i.T, i]));
                const pMap = new Map(pD.results.map(i => [i.T, i]));

                let html = ''; let labels = []; let scores = []; let dataLog = [];

                for (const [name, tickers] of Object.entries(groups)) {
                    let rows = ''; let net = 0;
                    tickers.forEach(t => {
                        const ticker = t.replace('.', '');
                        const c = cMap.get(ticker); const p = pMap.get(ticker);
                        let s = { l: "--", c: "text-slate-700" };
                        if (c && p) {
                            const hb = c.h > p.h; const lb = c.l < p.l;
                            if (hb && lb) s = { l: "3", c: "sig-3" };
                            else if (!hb && !lb) s = { l: "1", c: "sig-1" };
                            else if (hb) { s = { l: "2U", c: "sig-2u" }; net++; }
                            else if (lb) { s = { l: "2D", c: "sig-2d" }; net--; }
                        }
                        rows += `<div class="flex justify-between py-1 border-b border-slate-900/50 text-[9px] font-mono"><span>${t}</span><span class="${s.c}">${s.l}</span></div>`;
                    });
                    labels.push(name.split(' ')[0]);
                    scores.push(net);
                    dataLog.push({name, net});

                    html += `<div class="bg-slate-900/40 border border-slate-900 p-3 rounded">
                                <h3 class="text-blue-500 font-black text-[9px] uppercase mb-2 tracking-widest">${name}</h3>
                                ${rows}
                             </div>`;
                }
                dash.innerHTML = html;
                renderRotation(labels, scores);
                runForecast(dataLog);

            } catch (e) { dash.innerHTML = `<div class="col-span-full text-red-500 font-bold text-xs uppercase">Polygon API Connectivity Timeout</div>`; }
        }

        function renderRotation(labels, scores) {
            const ctx = document.getElementById('rotationChart').getContext('2d');
            if (rotChart) rotChart.destroy();
            rotChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [{
                        label: 'Net Flow Strength',
                        data: scores,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointBackgroundColor: scores.map(v => v >= 0 ? '#10b981' : '#ef4444')
                    }]
                },
                options: { plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#1e293b' } } } }
            });
        }

        function runForecast(data) {
            const box = document.getElementById('gemini-forecast');
            const content = document.getElementById('forecast-content');
            box.classList.remove('hidden');

            const leader = data.sort((a,b) => b.net - a.net)[0];
            const laggard = data.sort((a,b) => a.net - b.net)[0];

            content.innerHTML = `
                <div class="border-l-2 border-emerald-500 pl-3">
                    <p class="font-bold text-white uppercase text-[11px]">Current Flow Leader: <span class="text-emerald-400">${leader.name}</span></p>
                    <p class="text-slate-400">Institutional capital is "jamming the highs" here. If Monthly Continuity is Green, this is your high-conviction zone.</p>
                </div>
                <div class="border-l-2 border-red-500 pl-3">
                    <p class="font-bold text-white uppercase text-[11px]">Current Distribution Risk: <span class="text-red-400">${laggard.name}</span></p>
                    <p class="text-slate-400">Watch for the "Shooter" exhaustion. Institutions are rotating out of this sector to fund new entries.</p>
                </div>
                <div class="mt-4 p-4 bg-blue-500/10 rounded border border-blue-500/20">
                    <p class="font-black text-blue-400 uppercase text-[11px] mb-2 tracking-tighter">15-Year Institutional Forecast</p>
                    <p>Market cycles since 2011 suggest that when <strong>Software (IGV)</strong> and <strong>Semis (SMH)</strong> decouple with massive simultaneous breaks, a "Blow-off Top" is nearing. The next up-cycle pivot historically moves toward <strong>Materials (XLB)</strong> and <strong>Housing (XHB)</strong> as inflation/interest rate stabilization begins to be priced in. Watch for <strong>XHB</strong> to flip <strong>2-Up</strong> on the Monthly chart as the primary confirmation.</p>
                </div>
            `;
        }
    </script>
</body>
</html>
