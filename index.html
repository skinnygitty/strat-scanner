<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strat Flow Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .sig-2u { color: #10b981; font-weight: 800; } /* Green Institutional Buying */
        .sig-2d { color: #f87171; font-weight: 800; } /* Red Institutional Selling */
        .sig-3 { color: #60a5fa; font-weight: 800; text-decoration: underline; } /* Volatility/Broadening */
        .sig-1 { color: #fbbf24; font-weight: 800; } /* Equilibrium/Inside */
        .card-bullish { border-top: 4px solid #10b981; }
        .card-bearish { border-top: 4px solid #ef4444; }
    </style>
</head>
<body class="bg-[#0b0f1a] text-slate-300 min-h-screen p-4 font-sans">

    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-6 border-b border-slate-800 pb-4">
            <div>
                <h1 class="text-xl font-black text-white italic tracking-tighter uppercase">Strat Institutional Dashboard</h1>
                <p class="text-[10px] text-slate-500 font-bold tracking-[0.2em] uppercase">Simultaneous Breaks • Sector Rotation • Flow Analysis</p>
            </div>
            <button onclick="runStratScan()" class="bg-blue-600 hover:bg-blue-500 text-white text-[10px] font-black py-2 px-6 rounded uppercase tracking-widest transition-all">Execute Global Scan</button>
        </header>

        <div id="dashboard" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
            </div>

        <div id="analysis-trigger" class="mt-8 hidden border-t border-slate-800 pt-6">
            <div class="bg-slate-900/40 p-4 rounded-lg border border-slate-800">
                <h2 class="text-blue-400 text-xs font-black uppercase mb-2 tracking-widest italic underline">Institutional Flow Analysis</h2>
                <p id="gemini-status" class="text-xs text-slate-400">Scan complete. Analyze the simultaneous breaks above. Copy the data into our chat for a full Gemini interpretation of leaders and laggards.</p>
            </div>
        </div>
    </div>

    <script>
        const POLYGON_KEY = "lvT1rS4fdQJtn3cWMAcnps4Yf5bvTGTn";

        const groups = {
            "XLK (Tech)": ["XLK", "MSFT", "AAPL", "NVDA", "AVGO", "ORCL", "ADBE"],
            "XLF (Financial)": ["XLF", "BRK.B", "JPM", "V", "MA", "BAC", "GS"],
            "XLE (Energy)": ["XLE", "XOM", "CVX", "COP", "SLB", "EOG", "MPC"],
            "XLV (Health)": ["XLV", "LLY", "UNH", "JNJ", "ABBV", "MRK", "TMO"],
            "XLY (Discretionary)": ["XLY", "AMZN", "TSLA", "HD", "MCD", "NKE", "LOW"],
            "XLP (Staples)": ["XLP", "PG", "COST", "KO", "PEP", "PM", "WMT"],
            "XLI (Industrial)": ["XLI", "GE", "CAT", "UNP", "HON", "RTX", "LMT"],
            "XLB (Materials)": ["XLB", "LIN", "APD", "SHW", "FCX", "ECL", "NEM"],
            "XLU (Utilities)": ["XLU", "NEE", "SO", "DUK", "CEG", "SRE", "AEP"],
            "XLRE (Real Estate)": ["XLRE", "PLD", "AMT", "EQIX", "WELL", "PSA", "CCI"],
            "XLC (Comm)": ["XLC", "META", "GOOGL", "GOOG", "NFLX", "TMUS", "VZ"],
            "SMH (Semis)": ["SMH", "NVDA", "TSM", "AVGO", "ASML", "AMD", "QCOM"],
            "ARKK (Innovation)": ["ARKK", "TSLA", "COIN", "ROKU", "PATH", "SPOT", "TDOC"],
            "IBIT (Bitcoin)": ["IBIT", "BTC-USD", "COIN", "MSTR", "MARA", "RIOT", "HOOD"],
            "HACK (Cyber)": ["HACK", "CSCO", "PANW", "CRWD", "NET", "ZS", "FTNT"],
            "ICLN (Clean Energy)": ["ICLN", "FSLR", "ENPH", "NEE", "IBE", "ORSTED", "EDP"]
        };

        async function runStratScan() {
            const container = document.getElementById('dashboard');
            container.innerHTML = '<div class="col-span-full py-20 text-center text-blue-500 font-black animate-pulse">PULLING INSTITUTIONAL TAPE...</div>';

            try {
                // Fetch snapshots for current and previous days
                const url = `https://api.polygon.io/v2/aggs/grouped/locale/us/market/stocks/2026-04-24?adjusted=true&apiKey=${POLYGON_KEY}`;
                const prevUrl = `https://api.polygon.io/v2/aggs/grouped/locale/us/market/stocks/2026-04-23?adjusted=true&apiKey=${POLYGON_KEY}`;
                
                const [currRes, prevRes] = await Promise.all([fetch(url), fetch(prevUrl)]);
                const currData = await currRes.json();
                const prevData = await prevRes.json();

                const currMap = new Map(currData.results.map(i => [i.T, i]));
                const prevMap = new Map(prevData.results.map(i => [i.T, i]));

                let html = '';

                for (const [groupName, tickers] of Object.entries(groups)) {
                    let rows = '';
                    let upCount = 0;
                    let downCount = 0;

                    tickers.forEach(t => {
                        const c = currMap.get(t.replace('.', ''));
                        const p = prevMap.get(t.replace('.', ''));
                        let sig = { l: "N/A", c: "text-slate-700" };

                        if (c && p) {
                            const hb = c.h > p.h;
                            const lb = c.l < p.l;
                            if (hb && lb) sig = { l: "3", c: "sig-3" };
                            else if (!hb && !lb) sig = { l: "1", c: "sig-1" };
                            else if (hb) { sig = { l: "2U", c: "sig-2u" }; upCount++; }
                            else if (lb) { sig = { l: "2D", c: "sig-2d" }; downCount++; }
                        }
                        rows += `<div class="flex justify-between py-1 border-b border-slate-800/30 font-mono text-[10px]">
                                    <span class="text-slate-400">${t}</span><span class="${sig.c}">${sig.l}</span>
                                 </div>`;
                    });

                    // Determine Card Directional Rationale
                    const cardStatus = upCount > downCount ? 'card-bullish' : (downCount > upCount ? 'card-bearish' : 'border-slate-800');

                    html += `<div class="bg-[#131926] p-3 rounded shadow-lg border-x border-b border-slate-800 ${cardStatus}">
                                <h3 class="text-[10px] font-black text-blue-400 mb-2 uppercase tracking-tighter">${groupName}</h3>
                                ${rows}
                             </div>`;
                }
                container.innerHTML = html;
                document.getElementById('analysis-trigger').classList.remove('hidden');

            } catch (e) {
                container.innerHTML = `<div class="col-span-full text-red-500 font-bold">SCAN ERROR: CHECK API DATES/KEY</div>`;
            }
        }
    </script>
</body>
</html>
