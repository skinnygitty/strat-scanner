<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strat Flow Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .sig-2u { color: #10b981; font-weight: 800; border-right: 3px solid #10b981; padding-right: 4px; }
        .sig-2d { color: #f87171; font-weight: 800; border-right: 3px solid #f87171; padding-right: 4px; }
        .sig-3 { color: #60a5fa; font-weight: 800; text-decoration: underline; }
        .sig-1 { color: #fbbf24; font-weight: 800; }
        .bg-obsidian { background: #060912; }
    </style>
</head>
<body class="bg-obsidian text-slate-300 min-h-screen p-4">

    <div class="max-w-[1700px] mx-auto">
        <header class="flex justify-between items-center mb-6 border-b border-slate-800 pb-4">
            <div>
                <h1 class="text-xl font-black text-white italic tracking-tighter uppercase">Strat Institutional Flow</h1>
                <p class="text-[10px] text-slate-500 font-bold tracking-[0.2em] uppercase">Simultaneous Breaks • Automatic Split Adjustment</p>
            </div>
            <button onclick="runGlobalScan()" class="bg-blue-600 hover:bg-blue-500 text-white text-[10px] font-black py-2.5 px-10 rounded uppercase transition-all shadow-lg shadow-blue-500/20">Execute Scan</button>
        </header>

        <div id="dashboard" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-4 mb-8">
            </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 bg-slate-900/40 p-6 rounded-xl border border-slate-800">
                <h2 class="text-white text-[10px] font-black uppercase mb-4 tracking-widest italic">Thematic Flow Strength (Daily)</h2>
                <canvas id="mainChart" height="110"></canvas>
            </div>

            <div id="gemini-context" class="bg-blue-900/10 border border-blue-500/30 p-6 rounded-xl hidden">
                <h3 class="text-blue-400 font-black text-xs italic mb-4 uppercase underline">Institutional Interpretation</h3>
                <div id="analysis-content" class="text-[13px] leading-relaxed space-y-4"></div>
            </div>
        </div>
    </div>

    <script>
        const POLYGON_KEY = "lvT1rS4fdQJtn3cWMAcnps4Yf5bvTGTn";

        // Full Thematic & SPDR List with Top 6 Holdings
        const themes = {
            "XLK (Tech)": ["XLK", "MSFT", "AAPL", "NVDA", "AVGO", "ORCL", "ADBE"],
            "SMH (Semis)": ["SMH", "NVDA", "TSM", "AVGO", "ASML", "AMD", "QCOM"],
            "HACK (Cyber)": ["HACK", "CSCO", "PANW", "CRWD", "NET", "ZS", "FTNT"],
            "IBIT (BTC)": ["IBIT", "MSTR", "COIN", "MARA", "RIOT", "HOOD", "CLSK"],
            "ARKK (Innov)": ["ARKK", "TSLA", "COIN", "ROKU", "PATH", "SPOT", "DKNG"],
            "ICLN (Clean)": ["ICLN", "FSLR", "ENPH", "NEE", "IBE", "EDP", "VER"],
            "XLF (Fin)": ["XLF", "JPM", "V", "MA", "BAC", "GS", "MS"],
            "XLE (Energy)": ["XLE", "XOM", "CVX", "COP", "SLB", "EOG", "MPC"],
            "XLV (Health)": ["XLV", "LLY", "UNH", "JNJ", "ABBV", "MRK", "TMO"],
            "XLY (Disc)": ["XLY", "AMZN", "TSLA", "HD", "MCD", "NKE", "LOW"],
            "XLP (Staple)": ["XLP", "PG", "COST", "KO", "PEP", "PM", "WMT"],
            "XLI (Indus)": ["XLI", "GE", "CAT", "UNP", "HON", "RTX", "LMT"],
            "XLB (Mat)": ["XLB", "LIN", "APD", "SHW", "FCX", "ECL", "NEM"],
            "XLU (Util)": ["XLU", "NEE", "SO", "DUK", "CEG", "SRE", "AEP"],
            "XLRE (RE)": ["XLRE", "PLD", "AMT", "EQIX", "WELL", "PSA", "CCI"],
            "XLC (Comm)": ["XLC", "META", "GOOGL", "GOOG", "NFLX", "TMUS", "VZ"],
            "IWM (Small)": ["IWM", "VRTX", "VRT", "SMCI", "DECK", "STX", "MSTR"]
        };

        let chart = null;

        async function runGlobalScan() {
            const dash = document.getElementById('dashboard');
            dash.innerHTML = '<div class="col-span-full py-20 text-center font-bold text-blue-500 animate-pulse uppercase tracking-tighter">Syncing Flow Data...</div>';

            try {
                // Using adjustment-ready snapshots
                const url = `https://api.polygon.io/v2/aggs/grouped/locale/us/market/stocks/2026-04-24?adjusted=true&apiKey=${POLYGON_KEY}`;
                const prevUrl = `https://api.polygon.io/v2/aggs/grouped/locale/us/market/stocks/2026-04-23?adjusted=true&apiKey=${POLYGON_KEY}`;
                
                const [cR, pR] = await Promise.all([fetch(url), fetch(prevUrl)]);
                const cD = await cR.json();
                const pD = await pR.json();

                const cMap = new Map(cD.results.map(i => [i.T, i]));
                const pMap = new Map(pD.results.map(i => [i.T, i]));

                let html = ''; let labels = []; let scores = []; let log = [];

                for (const [name, tickers] of Object.entries(themes)) {
                    let rows = ''; let net = 0;
                    tickers.forEach(t => {
                        const ticker = t.replace('.', '');
                        const c = cMap.get(ticker); const p = pMap.get(ticker);
                        let s = { l: "--", c: "text-slate-700" };

                        if (c && p) {
                            const hb = c.h > p.h; const lb = c.l < p.l;
                            if (hb && lb) s = { l: "3", c: "sig-3" };
                            else if (!hb && !lb) s = { l: "1", c: "sig-1" };
                            else if (hb) { s = { l: "2U", c: "sig-2u" }; net++; }
                            else if (lb) { s = { l: "2D", c: "sig-2d" }; net--; }
                        }
                        rows += `<div class="flex justify-between py-1 border-b border-slate-800/20 text-[10px] font-mono"><span>${t}</span><span class="${s.c}">${s.l}</span></div>`;
                    });

                    labels.push(name.split(' ')[0]);
                    scores.push(net);
                    log.push({name, net});

                    html += `<div class="bg-slate-900/40 border border-slate-800 p-4 rounded-lg hover:border-slate-600 transition-colors">
                                <h3 class="text-blue-500 font-black text-[10px] uppercase mb-3 tracking-widest">${name}</h3>
                                ${rows}
                             </div>`;
                }
                dash.innerHTML = html;
                updateVisuals(labels, scores);
                updateIntelligence(log);
            } catch (e) { dash.innerHTML = `<div class="col-span-full text-red-500">SYSTEM ERROR: REFRESHING...</div>`; }
        }

        function updateVisuals(labels, scores) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'bar',
                data: { labels, datasets: [{ label: 'Flow Strength', data: scores, backgroundColor: scores.map(v => v >= 0 ? '#10b981aa' : '#f87171aa'), borderRadius: 4 }] },
                options: { plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#1e293b' } } } }
            });
        }

        function updateIntelligence(data) {
            const box = document.getElementById('gemini-context');
            const content = document.getElementById('analysis-content');
            box.classList.remove('hidden');

            const leader = data.sort((a,b) => b.net - a.net)[0];
            const laggard = data.sort((a,b) => a.net - b.net)[0];

            content.innerHTML = `
                <p>A <strong>Simultaneous Break</strong> is currently surfacing in <span class="text-emerald-400 font-bold">${leader.name}</span>. This indicates that institutional capital is not picking stocks, they are buying the entire basket.</p>
                <p>Conversely, <span class="text-red-400 font-bold">${laggard.name}</span> shows the highest distribution score. As Alex warned, these are "Shooter" environments on the Monthly chart where liquidity is being pulled.</p>
                <p class="text-slate-500 italic text-[11px]">Rationale: The bar graph represents the 'Net Flow'. A high positive bar across multiple themes signals a broader market risk-on environment.</p>
            `;
        }
    </script>
</body>
</html>
